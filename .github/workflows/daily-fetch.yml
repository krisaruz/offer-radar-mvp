name: Daily Interview Fetch

on:
  schedule:
    # Run daily at 00:00 UTC (08:00 Beijing time)
    - cron: '0 0 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Restore XHS cookies
        if: env.XHS_COOKIES != ''
        env:
          XHS_COOKIES: ${{ secrets.XHS_COOKIES }}
        run: |
          mkdir -p data
          echo "$XHS_COOKIES" > data/.xhs_cookies.json

      - name: Run fetch script
        run: python scripts/fetch_interviews.py

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet data/ || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git commit -m "chore: update interview data $(date -u +%Y-%m-%d)"
          git push

      - name: Notify Feishu
        if: always()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          if [ -n "$FEISHU_WEBHOOK" ]; then
            python scripts/notify_feishu.py
          else
            echo "FEISHU_WEBHOOK not set, skipping notification"
          fi

      - name: Summary
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          echo "Interview data updated successfully"
          echo "Date: $(date -u +%Y-%m-%d)"
